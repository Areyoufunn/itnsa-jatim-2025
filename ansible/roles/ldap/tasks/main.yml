---
- name: Install slapd dan ldap-utils
  ansible.builtin.apt:
    name: [slapd, ldap-utils, debconf-utils]
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Set slapd password
  ansible.builtin.debconf:
    name: slapd
    question: slapd/password1
    value: "Skills39!"
    vtype: password

- name: Set slapd password confirm
  ansible.builtin.debconf:
    name: slapd
    question: slapd/password2
    value: "Skills39!"
    vtype: password

- name: Set slapd domain
  ansible.builtin.debconf:
    name: slapd
    question: slapd/domain
    value: "itnsa.id"
    vtype: string

- name: Set slapd purge
  ansible.builtin.debconf:
    name: slapd
    question: slapd/purge_database
    value: "true"
    vtype: boolean

- name: Reconfigure slapd
  ansible.builtin.command:
    cmd: dpkg-reconfigure -f noninteractive slapd
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Copy users LDIF
  ansible.builtin.copy:
    src: users.ldif
    dest: /tmp/users.ldif

- name: Add LDAP users
  ansible.builtin.command:
    cmd: ldapadd -x -D "cn=admin,dc=itnsa,dc=id" -w "Skills39!" -f /tmp/users.ldif
  ignore_errors: true
