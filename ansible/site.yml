---
# LKS 2025 – Master Playbook
# Usage: ansible-playbook /etc/ansible/site.yml

- name: INT Server (DNS + LDAP + CA)
  hosts: int
  roles:
    - dns
    - ldap
    - ca

- name: Distribute CA cert to all servers
  hosts: all
  tasks:
    - name: Copy CA cert from int-srv
      ansible.builtin.shell:
        cmd: scp -o StrictHostKeyChecking=no root@192.168.2.11:{{ ca_dir }}/ca.pem /usr/local/share/ca-certificates/itnsa-root-ca.crt
        creates: /usr/local/share/ca-certificates/itnsa-root-ca.crt

    - name: Update CA certificates
      ansible.builtin.command:
        cmd: update-ca-certificates

- name: Copy certs to mail & web servers
  hosts: dmz_mail:dmz_web
  tasks:
    - name: Create cert directory
      ansible.builtin.file:
        path: "{{ ca_dir }}"
        state: directory
        mode: '0755'

    - name: Copy certs from int-srv
      ansible.builtin.shell:
        cmd: "scp -o StrictHostKeyChecking=no root@192.168.2.11:{{ ca_dir }}/{{ item }} {{ ca_dir }}/{{ item }}"
        creates: "{{ ca_dir }}/{{ item }}"
      loop:
        - ca.pem
        - web.pem
        - web.key
        - mail.pem
        - mail.key

- name: Mail Server
  hosts: dmz_mail
  roles:
    - mail

- name: Web Servers (Nginx)
  hosts: dmz_web
  roles:
    - nginx

- name: HA Proxy + Keepalived
  hosts: dmz_web
  roles:
    - haproxy

- name: Firewall (nftables)
  hosts: fw
  roles:
    - firewall

- name: WireGuard VPN Server
  hosts: fw
  roles:
    - vpn

- name: Client Setup
  hosts: client
  roles:
    - client
